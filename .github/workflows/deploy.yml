name: Deploy to GitHub Pages

# main'e her push'ta otomatik; ayrıca Actions sekmesinden elle de çalıştırılabilir.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

# GITHUB_TOKEN'a Pages'e deploy için gereken izinler.
permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda tek Pages deploy'u; devam eden bir deploy iptal EDİLMEZ (Pages'i yarıda bırakmamak için).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'        # Vite 8 -> Node >= 20.19 / 22.12 ister; 22 (LTS) güvenli.
          cache: npm                # package-lock.json'a göre bağımlılıkları cache'ler.

      - name: Install dependencies
        run: npm ci                 # .npmrc'deki legacy-peer-deps=true otomatik uygulanır (ERESOLVE'ı önler).

      - name: Build
        run: npm run build          # tsc -b && vite build  ->  çıktı: dist/  (base path: /ita/, vite.config.ts'ten)

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist                # vite build çıktısı; outDir override edilmediği için 'dist'.

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
